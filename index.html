<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÁT HẠCH LÝ THUYẾT MÁY NÂNG HÀNG - CAEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; }
        .q-grid-item { transition: all 0.2s; }
        .q-grid-item.active { border: 3px solid #f59e0b; background-color: #fef3c7; }
        .q-grid-item.answered { background-color: #10b981; color: white; border-color: #059669; }
        .option-card:hover { border-color: #3b82f6; background-color: #eff6ff; }
        .option-card.selected { border-color: #2563eb; background-color: #dbeafe; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); }
        
        /* Hiệu ứng chuyển cảnh */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Màn hình Đăng ký (Login Screen) -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-blue-900 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col md:flex-row">
            <div class="md:w-1/3 bg-blue-700 p-8 text-white flex flex-col justify-center items-center text-center">
                <i class="fas fa-id-card text-5xl mb-4"></i>
                <h2 class="text-xl font-bold uppercase tracking-tighter">Thông tin Học viên</h2>
            </div>
            <div class="md:w-2/3 p-8">
                <div class="mb-6">
                    <h3 class="text-2xl font-bold text-gray-800 mb-2">Trường CĐ Cơ điện nông nghiệp và môi trường!</h3>
                    <p class="text-gray-500 text-sm">Khoa Máy Thi Công.</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Họ và Tên:</label>
                        <input type="text" id="inputName" placeholder="Ví dụ: Nguyễn Văn A" 
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Khóa đào tạo:</label>
                        <input type="text" id="inputClass" placeholder="Ví dụ: K24-XN01" 
                               class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none transition">
                    </div>
                    <button onclick="startExamNow()" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl shadow-lg transition transform hover:scale-[1.02] active:scale-95 mt-4">
                        BẮT ĐẦU THI NGAY <i class="fas fa-play ml-2"></i>
                    </button>
                </div>
                <p class="mt-6 text-center text-xs text-gray-400 font-medium">© 2024 TRUNG TÂM ĐÀO TẠO KỸ THUẬT CAEE</p>
            </div>
        </div>
    </div>

    <!-- Header (Chỉ hiện sau khi đăng nhập) -->
    <header id="mainHeader" class="hidden bg-blue-800 text-white p-4 shadow-md flex justify-between items-center transition-all duration-500">
        <div class="flex items-center space-x-3">
            <i class="fas fa-truck-moving text-2xl"></i>
            <h1 class="text-xl font-bold uppercase tracking-wider">Sát hạch Vận hành Xe nâng</h1>
        </div>
        <div class="flex items-center space-x-6">
            <div class="text-right border-r pr-6 border-blue-400">
                <p class="text-[10px] uppercase opacity-70">Học viên - Khóa:</p>
                <p class="font-bold leading-none"><span id="studentName">...</span> - <span id="studentClass" class="text-orange-300">...</span></p>
            </div>
            <div id="timerDisplay" class="bg-red-600 px-4 py-2 rounded-lg text-2xl font-mono font-bold shadow-inner border border-red-400">
                20:00
            </div>
        </div>
    </header>

    <!-- Main Content (Chỉ hiện sau khi đăng nhập) -->
    <main id="mainContent" class="hidden flex-1 flex overflow-hidden fade-in">
        
        <!-- Question Area (Left) -->
        <section class="flex-1 p-6 overflow-y-auto bg-gray-100">
            <div id="questionContainer" class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">
                <div class="flex justify-between items-center mb-6">
                    <span id="questionTag" class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-xs font-black uppercase">Lý thuyết</span>
                    <span class="text-gray-500 font-bold">Câu hỏi <span id="currentQNum" class="text-blue-600 text-xl">1</span>/30</span>
                </div>

                <h2 id="questionText" class="text-2xl font-bold text-gray-800 mb-8 leading-snug">
                    Đang chuẩn bị câu hỏi...
                </h2>

                <div id="imageWrapper" class="hidden mb-8 flex justify-center bg-gray-50 rounded-2xl p-6 border-2 border-dashed border-gray-200">
                    <img id="questionImage" src="" alt="Minh họa" class="max-h-72 rounded-lg shadow-md">
                </div>

                <div id="optionsList" class="grid grid-cols-1 gap-4">
                    <!-- Options will be injected here -->
                </div>

                <div class="mt-12 pt-8 border-t flex justify-between">
                    <button onclick="prevQuestion()" class="px-8 py-3 bg-white border-2 border-gray-200 hover:border-blue-500 hover:text-blue-600 text-gray-600 rounded-xl font-black transition uppercase text-sm">
                        <i class="fas fa-arrow-left mr-2"></i> Câu trước
                    </button>
                    <button onclick="nextQuestion()" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-black transition uppercase shadow-md text-sm">
                        Câu tiếp theo <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Sidebar (Right) -->
        <aside class="w-80 bg-white border-l shadow-2xl p-6 flex flex-col z-10">
            <div class="mb-6 text-center">
                <h3 class="font-black text-gray-700 uppercase tracking-widest text-sm mb-4">
                    Sơ đồ câu hỏi
                </h3>
                <div id="questionGrid" class="grid grid-cols-5 gap-2 flex-1 content-start">
                    <!-- Grid 1-30 -->
                </div>
            </div>
            
            <div class="mt-auto space-y-4 pt-6 border-t">
                <div class="grid grid-cols-2 gap-2 text-[10px] font-bold uppercase">
                    <div class="flex items-center p-2 bg-emerald-50 text-emerald-700 rounded border border-emerald-200">
                        <div class="w-3 h-3 bg-emerald-500 rounded-full mr-2"></div> Đã làm
                    </div>
                    <div class="flex items-center p-2 bg-amber-50 text-amber-700 rounded border border-amber-200">
                        <div class="w-3 h-3 bg-amber-400 rounded-full mr-2"></div> Đang xem
                    </div>
                </div>
                <button onclick="confirmSubmit()" class="w-full py-5 bg-red-600 hover:bg-red-700 text-white font-black rounded-2xl shadow-xl transition transform hover:scale-[1.03] active:scale-95 text-lg">
                    <i class="fas fa-check-circle mr-2"></i> KẾT THÚC
                </button>
            </div>
        </aside>
    </main>

    <!-- Modal Kết quả -->
    <div id="resultModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[200] p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 text-center animate-bounce-short">
            <div id="resultIcon" class="text-7xl mb-4"></div>
            <h2 id="resultTitle" class="text-3xl font-black mb-2 uppercase"></h2>
            <p id="resultScore" class="text-2xl text-gray-600 mb-6 font-mono"></p>
            <div id="resultDetails" class="bg-blue-50 rounded-2xl p-6 mb-8 text-left space-y-3 font-medium">
                <!-- Details -->
            </div>
            <button onclick="window.location.reload()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black hover:bg-blue-700 transition shadow-lg uppercase">
                Về màn hình chính
            </button>
        </div>
    </div>

    <script>
        // Dữ liệu ngân hàng câu hỏi
        const questionBank = [
            // 10 câu đầu của bạn
            { q: "Khi lên hoặc xuống cabin xe nâng, người lái xe cần thực hiện như thế nào cho đúng?", options: { A: "Nhảy nhanh lên cabin để tiết kiệm thời gian.", B: "Bám vô lăng để leo lên.", C: "Tay trái nắm tay vịn, tay phải bám vào tựa lưng ghế, bước từng bậc lên xuống.", D: "Đặt chân lên càng nâng để leo lên." }, correct: "C", image: "https://drive.google.com/uc?export=download&id=1eRUzZsJtgEcj0vohejao3ga3iWJRr_UP", group: "Kỹ thuật lái" },
            { q: "Mục đích chính của việc kiểm tra xe nâng trước mỗi ca làm việc là gì?", options: { A: "Để đảm bảo xe luôn sạch sẽ.", B: "Để phát hiện sớm các hư hỏng tiềm ẩn và đảm bảo an toàn.", C: "Để tính toán lượng nhiên liệu.", D: "Để báo cáo cho cấp trên." }, correct: "B", group: "An toàn" },
            { q: "Khoảng cách an toàn tối thiểu giữa xe nâng và người đi bộ trong kho là bao nhiêu?", options: { A: "0.5 mét", B: "1 mét", C: "Ít nhất 2 mét", D: "5 mét" }, correct: "C", group: "An toàn" },
            { q: "Khi di chuyển trên mặt bằng phẳng không có hàng, chiều cao càng nâng nên là:", options: { A: "Sát mặt đất", B: "15 - 20 cm", C: "50 cm", D: "Nâng cao hết mức" }, correct: "B", group: "Vận hành" },
            { q: "Nếu tải trọng hàng che khuất tầm nhìn phía trước, người lái phải làm gì?", options: { A: "Rướn người ra ngoài", B: "Lùi xe khi di chuyển", C: "Nhờ người ngồi lên hàng chỉ đường", D: "Bấm còi liên tục và đi thẳng" }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Đèn cảnh báo nào sẽ sáng nếu hệ thống sạc của xe (máy phát) gặp sự cố?", options: { A: "Đèn báo dầu", B: "Đèn báo nhiệt độ", C: "Đèn báo ắc quy/sạc", D: "Đèn báo phanh" }, correct: "C", group: "Tín hiệu" },
            { q: "Khi thấy hàng bị nghiêng trên pallet, người lái cần làm gì?", options: { A: "Dừng xe và chỉnh lại hàng.", B: "Vẫn di chuyển bình thường.", C: "Tăng tốc để hàng không rơi.", D: "Phanh gấp để hàng cân bằng lại." }, correct: "A", group: "Kỹ thuật lái" },
            { q: "Trọng tâm của xe nâng thay đổi như thế nào khi nâng hàng lên cao?", options: { A: "Dịch chuyển ra phía trước và lên cao.", B: "Dịch chuyển ra phía sau.", C: "Không thay đổi.", D: "Hạ thấp xuống đất." }, correct: "A", group: "Lý thuyết cơ bản" },
            { q: "Khi xe nâng đang xuống dốc có tải, người lái nên di chuyển như thế nào?", options: { A: "Đi tiến.", B: "Đi lùi.", C: "Tắt máy thả trôi.", D: "Đi chéo dốc." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Sức nâng ghi trên biểu đồ tải trọng (Load Chart) là sức nâng tương ứng với:", options: { A: "Trọng tâm tải ở bất kỳ vị trí nào.", B: "Trọng tâm tải ở vị trí tiêu chuẩn.", C: "Chiều cao nâng tối đa.", D: "Chiều dài càng nâng." }, correct: "B", group: "Thông số kỹ thuật" },

            // Bổ sung các câu từ 11 đến 101
            { q: "Khi đỗ xe nâng, người lái cần thực hiện thao tác nào sau đây?", options: { A: "Hạ càng sát đất, nghiêng trụ ra phía trước, kéo phanh tay.", B: "Nâng càng cao 1m để tránh người đi qua.", C: "Tắt máy và để số tiến.", D: "Chỉ cần kéo phanh tay là đủ." }, correct: "A", group: "Vận hành" },
            { q: "Áp suất lốp xe nâng quá thấp sẽ gây ra hậu quả gì?", options: { A: "Xe đi nhanh hơn.", B: "Mất ổn định và dễ lật xe khi nâng hàng.", C: "Tiết kiệm nhiên liệu.", D: "Tăng tuổi thọ lốp." }, correct: "B", group: "An toàn" },
            { q: "Sử dụng xe nâng để nâng người lên cao mà không có lồng bảo vệ được phép không?", options: { A: "Được phép nếu đứng vững.", B: "Tuyệt đối không được phép.", C: "Được phép nếu nâng thấp.", D: "Được phép nếu có người giữ ở dưới." }, correct: "B", group: "An toàn" },
            { q: "Khi đi qua cửa kho hoặc khúc quanh, người lái phải làm gì?", options: { A: "Tăng tốc để qua nhanh.", B: "Đi bình thường.", C: "Giảm tốc độ và bấm còi cảnh báo.", D: "Tắt đèn để không làm chói mắt người khác." }, correct: "C", group: "Kỹ thuật lái" },
            { q: "Xích nâng cần được kiểm tra yếu tố nào sau đây?", options: { A: "Độ giãn, vết nứt và bôi trơn.", B: "Màu sơn của xích.", C: "Độ dài của xích.", D: "Trọng lượng của xích." }, correct: "A", group: "Bảo dưỡng" },
            { q: "Khi xe nâng bị lật ngang, người lái nên làm gì?", options: { A: "Nhảy ra khỏi xe ngay lập tức.", B: "Ngồi chặt trên ghế, bám vô lăng, nghiêng người ngược hướng lật.", C: "Cố gắng đẩy xe lại.", D: "Kêu cứu." }, correct: "B", group: "An toàn" },
            { q: "Bộ phận nào có chức năng thay đổi hướng chuyển động của xe?", options: { A: "Hệ thống phanh.", B: "Hệ thống lái.", C: "Hệ thống nâng hạ.", D: "Hộp số." }, correct: "B", group: "Cấu tạo" },
            { q: "Dầu thủy lực trong xe nâng có tác dụng gì?", options: { A: "Bôi trơn động cơ.", B: "Làm mát phanh.", C: "Truyền lực cho hệ thống nâng hạ.", D: "Để rửa xe." }, correct: "C", group: "Cấu tạo" },
            { q: "Tại sao không nên phanh gấp khi xe nâng đang có tải?", options: { A: "Làm hỏng phanh.", B: "Làm hàng rơi ra phía trước và lật xe.", C: "Làm mòn lốp.", D: "Gây tốn xăng." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Càng nâng nên đưa vào pallet như thế nào?", options: { A: "Vào một nửa chiều dài pallet.", B: "Vào hết chiều dài pallet và nằm cân đối.", C: "Vào lệch sang trái.", D: "Vào lệch sang phải." }, correct: "B", group: "Vận hành" },
            { q: "Khi làm việc ban đêm, xe nâng bắt buộc phải có thiết bị gì?", options: { A: "Còi hơi.", B: "Đèn chiếu sáng và đèn tín hiệu.", C: "Gương chiếu hậu lớn.", D: "Máy nghe nhạc." }, correct: "B", group: "An toàn" },
            { q: "Khói xả động cơ diesel có màu đen đặc là dấu hiệu gì?", options: { A: "Động cơ quá tốt.", B: "Thừa nhiên liệu hoặc lọc gió bị tắc.", C: "Thiếu dầu bôi trơn.", D: "Hết nước làm mát." }, correct: "B", group: "Bảo dưỡng" },
            { q: "Khoảng cách giữa hai càng nâng nên điều chỉnh như thế nào?", options: { A: "Càng rộng càng tốt.", B: "Càng hẹp càng tốt.", C: "Rộng tối đa và cân đối với tải trọng.", D: "Giữ nguyên một vị trí cố định." }, correct: "C", group: "Vận hành" },
            { q: "Khi lái xe nâng lên dốc có hàng, người lái phải đi như thế nào?", options: { A: "Đi tiến.", B: "Đi lùi.", C: "Đi chéo.", D: "Tắt máy đẩy lên." }, correct: "A", group: "Kỹ thuật lái" },
            { q: "Tải trọng tâm (Load Center) thường được tính từ đâu?", options: { A: "Từ đầu càng nâng.", B: "Từ mặt tựa lưng của càng nâng.", C: "Từ bánh trước.", D: "Từ mặt đất." }, correct: "B", group: "Thông số kỹ thuật" },
            { q: "Pallet hỏng có được sử dụng để nâng hàng không?", options: { A: "Được nếu hàng nhẹ.", B: "Được nếu dùng dây buộc lại.", C: "Tuyệt đối không được sử dụng.", D: "Được nếu chỉ nâng thấp." }, correct: "C", group: "An toàn" },
            { q: "Khi người đi bộ cắt ngang đường xe nâng đang chạy, ưu tiên thuộc về ai?", options: { A: "Xe nâng.", B: "Người đi bộ.", C: "Ai đi nhanh hơn thì đi trước.", D: "Do hai bên tự thỏa thuận." }, correct: "B", group: "An toàn" },
            { q: "Van an toàn trong hệ thống thủy lực có tác dụng gì?", options: { A: "Tăng tốc độ nâng.", B: "Tránh quá tải cho hệ thống.", C: "Giảm tiếng ồn.", D: "Tiết kiệm dầu." }, correct: "B", group: "Cấu tạo" },
            { q: "Nhiên liệu của xe nâng điện là gì?", options: { A: "Xăng.", B: "Dầu Diesel.", C: "Ắc quy (điện năng).", D: "Gas (LPG)." }, correct: "C", group: "Cấu tạo" },
            { q: "Trong kho hẹp, loại xe nâng nào thường được sử dụng?", options: { A: "Xe nâng container.", B: "Xe nâng Reach Truck (tầm cao).", C: "Xe nâng dầu 10 tấn.", D: "Xe cẩu." }, correct: "B", group: "Vận hành" },
            { q: "Trước khi khởi động xe nâng dầu, cần kiểm tra mức dầu nào?", options: { A: "Dầu động cơ.", B: "Dầu hộp số.", C: "Dầu thủy lực.", D: "Tất cả các loại trên." }, correct: "D", group: "Bảo dưỡng" },
            { q: "Khi nâng hàng, nếu nghe tiếng kêu lạ từ hệ thống thủy lực, bạn làm gì?", options: { A: "Cố gắng làm nốt ca.", B: "Dừng máy và báo kỹ thuật kiểm tra.", C: "Đổ thêm nước vào bình dầu.", D: "Bịt tai lại và làm tiếp." }, correct: "B", group: "Bảo dưỡng" },
            { q: "Độ nghiêng của trụ nâng ra phía sau có tác dụng gì khi di chuyển?", options: { A: "Để hàng không bị trượt ra phía trước.", B: "Để xe đi nhanh hơn.", C: "Để tiết kiệm dầu.", D: "Chỉ để cho đẹp." }, correct: "A", group: "Kỹ thuật lái" },
            { q: "Khi xe nâng làm việc trong container, cần lưu ý điều gì nhất?", options: { A: "Đèn chiếu sáng bên trong và sàn container.", B: "Màu sơn container.", C: "Kích thước bánh xe.", D: "Nhiệt độ ngoài trời." }, correct: "A", group: "An toàn" },
            { q: "Phanh tay xe nâng nên được sử dụng khi nào?", options: { A: "Khi đang chạy tốc độ cao.", B: "Khi dừng, đỗ xe hoặc trên dốc.", C: "Khi nâng hàng lên cao.", D: "Khi đang lùi xe." }, correct: "B", group: "Vận hành" },
            { q: "Nước làm mát động cơ có tác dụng gì?", options: { A: "Rửa sạch động cơ.", B: "Giữ nhiệt độ động cơ ở mức ổn định.", C: "Tăng công suất động cơ.", D: "Làm động cơ kêu to hơn." }, correct: "B", group: "Cấu tạo" },

            { q: "Khi đỗ xe trên dốc (trường hợp khẩn cấp), bạn phải làm gì ngoài phanh tay?", options: { A: "Tắt máy và bỏ đi.", B: "Chèn bánh xe bằng gỗ hoặc đá.", C: "Cứ để xe trôi tự do.", D: "Nhờ người giữ xe." }, correct: "B", group: "Vận hành" },
            { q: "Dầu phanh xe nâng cần được kiểm tra ở đâu?", options: { A: "Bình chứa dầu phanh thường nằm gần bàn đạp phanh hoặc trong khoang máy.", B: "Trong lốp xe.", C: "Trong ống xả.", D: "Trên nóc cabin." }, correct: "A", group: "Bảo dưỡng" },
            { q: "Tiếng còi 'bíp bíp' khi xe nâng lùi có mục đích gì?", options: { A: "Để người lái đỡ buồn ngủ.", B: "Cảnh báo cho người xung quanh biết xe đang lùi.", C: "Báo hiệu xe sắp hết xăng.", D: "Báo hiệu xe đã hỏng." }, correct: "B", group: "Tín hiệu" },
            { q: "Khi vận chuyển hàng lỏng trong thùng, cần lưu ý điều gì?", options: { A: "Đi thật nhanh.", B: "Tránh phanh gấp hoặc đổi hướng đột ngột vì sóng sánh làm lật xe.", C: "Mở nắp thùng ra cho thoáng.", D: "Không cần lưu ý gì." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Ánh sáng xanh (Blue Light) chiếu xuống đất phía sau xe nâng điện dùng để:", options: { A: "Làm đẹp cho xe.", B: "Cảnh báo sớm cho người đi bộ biết xe đang đi tới từ phía sau.", C: "Chiếu sáng đường đi.", D: "Báo hiệu xe đã đầy pin." }, correct: "B", group: "Tín hiệu" },
            { q: "Kỹ năng 'Sling' (sử dụng dây cẩu) kết hợp với xe nâng có được phép không?", options: { A: "Được nếu có phụ kiện chuyên dụng và được cấp phép.", B: "Tuyệt đối cấm dùng dây buộc vào càng nâng.", C: "Được nếu dùng dây thừng chắc.", D: "Chỉ được dùng dây thép." }, correct: "A", group: "Vận hành" },
            { q: "Khi làm việc dưới trời mưa, xe nâng dầu cần lưu ý gì?", options: { A: "Trơn trượt và tầm nhìn hạn chế.", B: "Xe sẽ sạch hơn.", C: "Xe sẽ mát hơn.", D: "Không nên làm việc dưới mưa." }, correct: "A", group: "An toàn" },
            { q: "Sau khi kết thúc ca làm việc, bạn nên làm gì với chìa khóa xe?", options: { A: "Cứ để trên xe.", B: "Rút chìa khóa và bàn giao hoặc để đúng nơi quy định.", C: "Cầm về nhà.", D: "Vứt đi." }, correct: "B", group: "Vận hành" },
            { q: "Lốp đặc (Solid Tire) thường được dùng trong môi trường nào?", options: { A: "Đường bùn lầy.", B: "Sàn kho bằng phẳng, nhiều vật sắc nhọn (đinh, mảnh gỗ).", C: "Trên bãi cát.", D: "Trong rừng." }, correct: "B", group: "Thông số kỹ thuật" },
            { q: "Khi thấy xe nâng khác đang tiến lại gần ở ngã tư kho, bạn nên:", options: { A: "Tăng tốc để vượt qua trước.", B: "Giảm tốc độ, bấm còi, và nhường đường nếu cần thiết.", C: "Cứ đi bình thường.", D: "Dừng lại và tắt máy." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Tại sao không được phép nâng hàng khi trụ nâng đang nghiêng về phía trước?", options: { A: "Làm hàng dễ bị trượt rơi và xe dễ lật về phía trước.", B: "Làm xe đi chậm.", C: "Làm hỏng xích nâng.", D: "Làm tốn dầu thủy lực." }, correct: "A", group: "An toàn" },
            { q: "Vệ sinh xe nâng nên thực hiện khi nào?", options: { A: "Khi xe quá bẩn.", B: "Định kỳ hàng tuần hoặc sau ca làm việc trong môi trường bụi bẩn.", C: "Khi xe hỏng.", D: "Không cần vệ sinh." }, correct: "B", group: "Bảo dưỡng" },
            { q: "Người lái xe nâng có được phép tự ý sửa chữa hệ thống điện không?", options: { A: "Được nếu biết sơ sơ.", B: "Không, phải do nhân viên kỹ thuật chuyên môn thực hiện.", C: "Được nếu có kìm và tuốc nơ vít.", D: "Được nếu xe đã hết bảo hành." }, correct: "B", group: "Bảo dưỡng" },
            { q: "Khi xuống dốc không tải (không có hàng), xe nâng đi như thế nào?", options: { A: "Đi tiến.", B: "Đi lùi.", C: "Đi chéo.", D: "Tắt máy thả trôi." }, correct: "A", group: "Kỹ thuật lái" },
            { q: "Tốc độ tối đa an toàn của xe nâng trong kho thường là:", options: { A: "5 - 10 km/h.", B: "30 km/h.", C: "50 km/h.", D: "Tùy ý người lái." }, correct: "A", group: "Vận hành" },
            { q: "Thái độ quan trọng nhất của người lái xe nâng là gì?", options: { A: "Luôn đặt an toàn lên hàng đầu.", B: "Làm việc thật nhanh để tăng sản lượng.", C: "Tiết kiệm nhiên liệu tối đa.", D: "Nghe lời sếp tuyệt đối dù mất an toàn." }, correct: "A", group: "An toàn" }
        ];

        let examQuestions = [];
        let userAnswers = new Array(30).fill(null);
        let currentIdx = 0;
        let timeLeft = 1200; // 20 phút
        let timerId;

        // Hàm Bắt đầu thi (Xử lý form đăng nhập)
        function startExamNow() {
            const name = document.getElementById('inputName').value.trim();
            const className = document.getElementById('inputClass').value.trim();

            if (!name || !className) {
                alert("Vui lòng nhập đầy đủ Họ tên và Khóa đào tạo!");
                return;
            }

            // Gán dữ liệu vào Header
            document.getElementById('studentName').innerText = name;
            document.getElementById('studentClass').innerText = className;

            // Chuyển màn hình
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainHeader').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');

            // Khởi tạo đề thi
            initExamData();
        }

        function initExamData() {
            // Xáo trộn ngân hàng và lấy 30 câu
            examQuestions = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 30);
            
            // Bù thêm nếu bank ít hơn 30
            while(examQuestions.length < 30) {
                const randQ = questionBank[Math.floor(Math.random() * questionBank.length)];
                examQuestions.push({...randQ});
            }

            renderGrid();
            showQuestion(0);
            startTimer();
        }

        function renderGrid() {
            const grid = document.getElementById('questionGrid');
            grid.innerHTML = '';
            for(let i=0; i<30; i++) {
                const btn = document.createElement('div');
                btn.className = `q-grid-item h-11 flex items-center justify-center bg-white border-2 border-gray-100 rounded-xl cursor-pointer font-black text-sm text-gray-400 shadow-sm`;
                btn.id = `grid-item-${i}`;
                btn.innerText = i + 1;
                btn.onclick = () => showQuestion(i);
                grid.appendChild(btn);
            }
        }

        function showQuestion(idx) {
            currentIdx = idx;
            const q = examQuestions[idx];
            
            document.getElementById('currentQNum').innerText = idx + 1;
            document.getElementById('questionText').innerText = q.q;
            document.getElementById('questionTag').innerText = q.group || "Kỹ năng";
            
            // Hình ảnh
            const imgWrap = document.getElementById('imageWrapper');
            const img = document.getElementById('questionImage');
            if(q.image) {
                img.src = q.image;
                imgWrap.classList.remove('hidden');
            } else {
                imgWrap.classList.add('hidden');
            }

            // Options
            const list = document.getElementById('optionsList');
            list.innerHTML = '';
            
            ['A', 'B', 'C', 'D'].forEach(label => {
                if(q.options[label]) {
                    const btn = document.createElement('div');
                    btn.className = `option-card p-5 border-2 border-gray-100 rounded-2xl cursor-pointer transition-all flex items-center ${userAnswers[idx] === label ? 'selected' : ''}`;
                    btn.innerHTML = `
                        <div class="w-10 h-10 rounded-full border-2 flex items-center justify-center mr-5 font-black text-lg transition-colors ${userAnswers[idx] === label ? 'bg-blue-600 border-blue-600 text-white' : 'border-gray-200 text-gray-400'}">
                            ${label}
                        </div>
                        <div class="text-gray-700 font-bold text-lg">${q.options[label]}</div>
                    `;
                    btn.onclick = () => selectOption(idx, label);
                    list.appendChild(btn);
                }
            });

            // Update UI Grid
            document.querySelectorAll('.q-grid-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`grid-item-${idx}`).classList.add('active');
        }

        function selectOption(qIdx, option) {
            userAnswers[qIdx] = option;
            document.getElementById(`grid-item-${qIdx}`).classList.add('answered');
            showQuestion(qIdx);
        }

        function nextQuestion() {
            if(currentIdx < 29) showQuestion(currentIdx + 1);
        }

        function prevQuestion() {
            if(currentIdx > 0) showQuestion(currentIdx - 1);
        }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                
                if(timeLeft <= 0) {
                    clearInterval(timerId);
                    submitExam();
                }
            }, 1000);
        }

        function confirmSubmit() {
            const answeredCount = userAnswers.filter(a => a !== null).length;
            const msg = answeredCount < 30 ? 
                `Bạn mới hoàn thành ${answeredCount}/30 câu. Chắc chắn muốn nộp bài sớm?` : 
                `Bạn đã hoàn thành 30 câu hỏi. Nộp bài để xem kết quả?`;
            
            if(confirm(msg)) submitExam();
        }

        function submitExam() {
            clearInterval(timerId);
            let score = 0;

            examQuestions.forEach((q, i) => {
                if(userAnswers[i] === q.correct) score++;
            });

            const isPassed = score >= 27;
            const modal = document.getElementById('resultModal');
            
            modal.classList.remove('hidden');
            document.getElementById('resultIcon').innerText = isPassed ? '🎉' : '❌';
            const title = document.getElementById('resultTitle');
            title.innerText = isPassed ? "KẾT QUẢ: ĐẠT" : "KẾT QUẢ: TRƯỢT";
            title.className = `text-4xl font-black mb-2 uppercase ${isPassed ? 'text-green-600' : 'text-red-600'}`;
            
            document.getElementById('resultScore').innerText = `Số câu đúng: ${score} / 30`;
            document.getElementById('resultDetails').innerHTML = `
                <div class="flex justify-between border-b pb-2"><span>Học viên:</span> <b>${document.getElementById('studentName').innerText}</b></div>
                <div class="flex justify-between border-b pb-2"><span>Khóa:</span> <b>${document.getElementById('studentClass').innerText}</b></div>
                <div class="flex justify-between border-b pb-2"><span>Thời gian làm:</span> <b>${Math.floor((1200 - timeLeft)/60)} phút</b></div>
                <div class="flex justify-center pt-2 italic text-sm ${isPassed ? 'text-green-600' : 'text-red-400'}">
                    ${isPassed ? 'Đã đủ điều kiện cấp chứng chỉ vận hành!' : 'Cần ôn tập thêm để thi lại lần sau.'}
                </div>
            `;
        }

        // Phím tắt bàn phím (Giống phần mềm thi thật)
        document.addEventListener('keydown', (e) => {
            if(document.getElementById('loginScreen').classList.contains('hidden')) {
                if(e.key === 'ArrowRight' || e.key === 'ArrowDown') nextQuestion();
                if(e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevQuestion();
                if(['1','2','3','4'].includes(e.key)) {
                    const labels = ['A', 'B', 'C', 'D'];
                    selectOption(currentIdx, labels[parseInt(e.key) - 1]);
                }
                if(e.key === 'Enter') confirmSubmit();
            }
        });
    </script>
</body>
