<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG - KHOA MÁY THI CÔNG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: #f0f2f5; 
            -webkit-tap-highlight-color: transparent;
        }
        .q-grid-item { transition: all 0.2s; }
        .q-grid-item.active { border: 3px solid #f59e0b; background-color: #fef3c7; color: #b45309; }
        .q-grid-item.answered { background-color: #10b981; color: white; border-color: #059669; }
        
        .option-card { touch-action: manipulation; }
        .option-card:active { transform: scale(0.98); }
        .option-card.selected { border-color: #2563eb; background-color: #dbeafe; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
        
        /* Custom scrollbar cho vùng câu hỏi */
        #mainScrollArea::-webkit-scrollbar { width: 4px; }
        #mainScrollArea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            #mainContent { flex-direction: column; overflow-y: auto; }
            aside { width: 100% !important; border-left: none; border-top: 1px solid #e2e8f0; }
            #timerDisplay { font-size: 1.25rem; padding: 0.25rem 0.75rem; }
            header h1 { font-size: 0.9rem; }
            .option-card { padding: 1rem !important; }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Màn hình Đăng ký (Login Screen) -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-blue-900 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col md:flex-row">
            <div class="md:w-1/3 bg-blue-700 p-6 text-white flex flex-col justify-center items-center text-center">
                <i class="fas fa-id-card text-5xl mb-4"></i>
                <h2 class="text-xl font-bold uppercase tracking-tighter">Thông tin Học viên</h2>
            </div>
            <div class="md:w-2/3 p-6">
                <div class="mb-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-1">TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</h3>
                    <p class="text-blue-600 font-bold text-xs uppercase">KHOA MÁY THI CÔNG</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Họ và Tên:</label>
                        <input type="text" id="inputName" placeholder="Nguyễn Văn A" 
                               class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:outline-none transition text-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Khóa:</label>
                        <input type="text" id="inputClass" placeholder="Ví dụ: 4.2026" 
                               class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:outline-none transition text-lg">
                    </div>
                    <button onclick="startExamNow()" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-black rounded-xl shadow-lg transition active:scale-95 mt-4 uppercase tracking-widest">
                        BẮT ĐẦU THI <i class="fas fa-play ml-2"></i>
                    </button>
                </div>
                <p class="mt-6 text-center text-[10px] text-gray-400 font-medium">© 2026 TRUNG TÂM ĐÀO TẠO KỸ THUẬT CAEE</p>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header id="mainHeader" class="hidden bg-blue-800 text-white p-3 md:p-4 shadow-md flex justify-between items-center z-50">
        <div class="flex items-center space-x-2">
            <i class="fas fa-truck-moving text-xl md:text-2xl text-orange-400"></i>
            <h1 class="text-sm md:text-xl font-bold uppercase truncate max-w-[150px] md:max-w-none">SÁT HẠCH LÝ THUYẾT MÁY NÂNG HÀNG - CAEE</h1>
        </div>
        <div class="flex items-center space-x-2 md:space-x-6">
            <div class="hidden md:block text-right border-r pr-6 border-blue-400">
                <p class="text-[10px] uppercase opacity-70 font-bold">Học viên:</p>
                <p class="font-bold leading-none"><span id="studentName">...</span></p>
            </div>
            <div id="timerDisplay" class="bg-red-600 px-3 py-1 md:px-4 md:py-2 rounded-lg text-xl md:text-2xl font-mono font-bold shadow-inner border border-red-400">
                20:00
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="mainContent" class="hidden flex-1 flex overflow-hidden">
        
        <!-- Question Area -->
        <section id="mainScrollArea" class="flex-1 p-3 md:p-6 overflow-y-auto bg-gray-100 scroll-smooth">
            <div id="questionContainer" class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm p-5 md:p-8 fade-in">
                <div class="flex justify-between items-center mb-4 md:mb-6">
                    <span id="questionTag" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider">Lý thuyết</span>
                    <span class="text-gray-400 font-bold text-sm">Câu <span id="currentQNum" class="text-blue-600 text-lg">1</span>/30</span>
                </div>

                <h2 id="questionText" class="text-lg md:text-2xl font-bold text-gray-800 mb-6 leading-tight">
                    Đang tải câu hỏi...
                </h2>

                <div id="imageWrapper" class="hidden mb-6 flex justify-center bg-gray-50 rounded-2xl p-4 border border-gray-200">
                    <img id="questionImage" src="" alt="Minh họa" class="max-h-48 md:max-h-72 rounded-lg shadow-sm">
                </div>

                <div id="optionsList" class="grid grid-cols-1 gap-3 md:gap-4">
                    <!-- Options -->
                </div>

                <div class="mt-8 md:mt-12 pt-6 border-t flex justify-between items-center">
                    <button onclick="prevQuestion()" class="flex-1 md:flex-none mr-2 px-4 md:px-8 py-3 bg-white border-2 border-gray-100 text-gray-500 rounded-xl font-bold transition active:bg-gray-50 text-xs md:text-sm uppercase">
                        <i class="fas fa-chevron-left mr-1"></i> Trước
                    </button>
                    <button onclick="nextQuestion()" class="flex-1 md:flex-none ml-2 px-4 md:px-8 py-3 bg-blue-600 text-white rounded-xl font-bold transition active:bg-blue-700 shadow-md text-xs md:text-sm uppercase">
                        Tiếp <i class="fas fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>
            
            <!-- Mobile Grid Preview (Chỉ hiện trên mobile) -->
            <div class="md:hidden mt-6 p-2">
                <p class="text-center text-[10px] font-black text-gray-400 uppercase mb-3">Danh sách câu hỏi</p>
                <div id="mobileGrid" class="grid grid-cols-6 gap-2"></div>
            </div>
        </section>

        <!-- Sidebar (Desktop) -->
        <aside class="hidden md:flex w-80 bg-white border-l shadow-xl p-6 flex-col">
            <div class="mb-6">
                <h3 class="font-black text-gray-400 uppercase tracking-widest text-[10px] mb-4 text-center">Sơ đồ câu hỏi</h3>
                <div id="questionGrid" class="grid grid-cols-5 gap-2"></div>
            </div>
            
            <div class="mt-auto space-y-4">
                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Trạng thái</p>
                    <div class="flex items-center text-xs font-bold text-emerald-600 mb-1">
                        <div class="w-3 h-3 bg-emerald-500 rounded-full mr-2"></div> Đã trả lời
                    </div>
                    <div class="flex items-center text-xs font-bold text-amber-500">
                        <div class="w-3 h-3 bg-amber-400 rounded-full mr-2"></div> Đang chọn
                    </div>
                </div>
                <button onclick="confirmSubmit()" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black rounded-xl shadow-lg transition active:scale-95 text-lg uppercase">
                    Nộp bài
                </button>
            </div>
        </aside>

        <!-- Nút Nộp bài Mobile -->
        <div class="md:hidden p-4 bg-white border-t">
            <button onclick="confirmSubmit()" class="w-full py-4 bg-red-600 text-white font-black rounded-xl shadow-lg uppercase tracking-widest">
                Kết thúc bài thi
            </button>
        </div>
    </main>

    <!-- Modal Kết quả -->
    <div id="resultModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[200] p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 text-center">
            <div id="resultIcon" class="text-6xl mb-4"></div>
            <h2 id="resultTitle" class="text-2xl font-black mb-1 uppercase"></h2>
            <p id="resultScore" class="text-4xl font-mono font-black text-blue-600 mb-6"></p>
            <div id="resultDetails" class="bg-gray-50 rounded-2xl p-5 mb-6 text-left space-y-2 text-sm"></div>
            <button onclick="window.location.reload()" class="w-full py-4 bg-gray-800 text-white rounded-xl font-black hover:bg-black transition shadow-lg uppercase">
                Thoát
            </button>
        </div>
    </div>

    <script>
        // Dữ liệu ngân hàng câu hỏi (Rút gọn để tập trung vào logic, bạn có thể copy lại full 101 câu vào đây)
        const questionBank = [
            // 10 câu đầu của bạn
            { q: "Khi lên hoặc xuống cabin xe nâng, người lái xe cần thực hiện như thế nào cho đúng?", options: { A: "Nhảy nhanh lên cabin để tiết kiệm thời gian.", B: "Bám vô lăng để leo lên.", C: "Tay trái nắm tay vịn, tay phải bám vào tựa lưng ghế, bước từng bậc lên xuống.", D: "Đặt chân lên càng nâng để leo lên." }, correct: "C", image: "https://drive.google.com/uc?export=download&id=1eRUzZsJtgEcj0vohejao3ga3iWJRr_UP", group: "Kỹ thuật lái" },
            { q: "Mục đích chính của việc kiểm tra xe nâng trước mỗi ca làm việc là gì?", options: { A: "Để đảm bảo xe luôn sạch sẽ.", B: "Để phát hiện sớm các hư hỏng tiềm ẩn và đảm bảo an toàn.", C: "Để tính toán lượng nhiên liệu.", D: "Để báo cáo cho cấp trên." }, correct: "B", group: "An toàn" },
            { q: "Khoảng cách an toàn tối thiểu giữa xe nâng và người đi bộ trong kho là bao nhiêu?", options: { A: "0.5 mét", B: "1 mét", C: "Ít nhất 2 mét", D: "5 mét" }, correct: "C", group: "An toàn" },
            { q: "Khi di chuyển trên mặt bằng phẳng không có hàng, chiều cao càng nâng nên là:", options: { A: "Sát mặt đất", B: "15 - 20 cm", C: "50 cm", D: "Nâng cao hết mức" }, correct: "B", group: "Vận hành" },
            { q: "Nếu tải trọng hàng che khuất tầm nhìn phía trước, người lái phải làm gì?", options: { A: "Rướn người ra ngoài", B: "Lùi xe khi di chuyển", C: "Nhờ người ngồi lên hàng chỉ đường", D: "Bấm còi liên tục và đi thẳng" }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Đèn cảnh báo nào sẽ sáng nếu hệ thống sạc của xe (máy phát) gặp sự cố?", options: { A: "Đèn báo dầu", B: "Đèn báo nhiệt độ", C: "Đèn báo ắc quy/sạc", D: "Đèn báo phanh" }, correct: "C", group: "Tín hiệu" },
            { q: "Khi thấy hàng bị nghiêng trên pallet, người lái cần làm gì?", options: { A: "Dừng xe và chỉnh lại hàng.", B: "Vẫn di chuyển bình thường.", C: "Tăng tốc để hàng không rơi.", D: "Phanh gấp để hàng cân bằng lại." }, correct: "A", group: "Kỹ thuật lái" },
            { q: "Trọng tâm của xe nâng thay đổi như thế nào khi nâng hàng lên cao?", options: { A: "Dịch chuyển ra phía trước và lên cao.", B: "Dịch chuyển ra phía sau.", C: "Không thay đổi.", D: "Hạ thấp xuống đất." }, correct: "A", group: "Lý thuyết cơ bản" },
            { q: "Khi xe nâng đang xuống dốc có tải, người lái nên di chuyển như thế nào?", options: { A: "Đi tiến.", B: "Đi lùi.", C: "Tắt máy thả trôi.", D: "Đi chéo dốc." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Sức nâng ghi trên biểu đồ tải trọng (Load Chart) là sức nâng tương ứng với:", options: { A: "Trọng tâm tải ở bất kỳ vị trí nào.", B: "Trọng tâm tải ở vị trí tiêu chuẩn.", C: "Chiều cao nâng tối đa.", D: "Chiều dài càng nâng." }, correct: "B", group: "Thông số kỹ thuật" },

            // Bổ sung các câu từ 11 đến 101
            { q: "Khi đỗ xe nâng, người lái cần thực hiện thao tác nào sau đây?", options: { A: "Hạ càng sát đất, nghiêng trụ ra phía trước, kéo phanh tay.", B: "Nâng càng cao 1m để tránh người đi qua.", C: "Tắt máy và để số tiến.", D: "Chỉ cần kéo phanh tay là đủ." }, correct: "A", group: "Vận hành" },
            { q: "Áp suất lốp xe nâng quá thấp sẽ gây ra hậu quả gì?", options: { A: "Xe đi nhanh hơn.", B: "Mất ổn định và dễ lật xe khi nâng hàng.", C: "Tiết kiệm nhiên liệu.", D: "Tăng tuổi thọ lốp." }, correct: "B", group: "An toàn" },
            { q: "Sử dụng xe nâng để nâng người lên cao mà không có lồng bảo vệ được phép không?", options: { A: "Được phép nếu đứng vững.", B: "Tuyệt đối không được phép.", C: "Được phép nếu nâng thấp.", D: "Được phép nếu có người giữ ở dưới." }, correct: "B", group: "An toàn" },
            { q: "Khi đi qua cửa kho hoặc khúc quanh, người lái phải làm gì?", options: { A: "Tăng tốc để qua nhanh.", B: "Đi bình thường.", C: "Giảm tốc độ và bấm còi cảnh báo.", D: "Tắt đèn để không làm chói mắt người khác." }, correct: "C", group: "Kỹ thuật lái" },
            { q: "Xích nâng cần được kiểm tra yếu tố nào sau đây?", options: { A: "Độ giãn, vết nứt và bôi trơn.", B: "Màu sơn của xích.", C: "Độ dài của xích.", D: "Trọng lượng của xích." }, correct: "A", group: "Bảo dưỡng" },
            { q: "Khi xe nâng bị lật ngang, người lái nên làm gì?", options: { A: "Nhảy ra khỏi xe ngay lập tức.", B: "Ngồi chặt trên ghế, bám vô lăng, nghiêng người ngược hướng lật.", C: "Cố gắng đẩy xe lại.", D: "Kêu cứu." }, correct: "B", group: "An toàn" },
            { q: "Bộ phận nào có chức năng thay đổi hướng chuyển động của xe?", options: { A: "Hệ thống phanh.", B: "Hệ thống lái.", C: "Hệ thống nâng hạ.", D: "Hộp số." }, correct: "B", group: "Cấu tạo" },
            { q: "Dầu thủy lực trong xe nâng có tác dụng gì?", options: { A: "Bôi trơn động cơ.", B: "Làm mát phanh.", C: "Truyền lực cho hệ thống nâng hạ.", D: "Để rửa xe." }, correct: "C", group: "Cấu tạo" },
            { q: "Tại sao không nên phanh gấp khi xe nâng đang có tải?", options: { A: "Làm hỏng phanh.", B: "Làm hàng rơi ra phía trước và lật xe.", C: "Làm mòn lốp.", D: "Gây tốn xăng." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Càng nâng nên đưa vào pallet như thế nào?", options: { A: "Vào một nửa chiều dài pallet.", B: "Vào hết chiều dài pallet và nằm cân đối.", C: "Vào lệch sang trái.", D: "Vào lệch sang phải." }, correct: "B", group: "Vận hành" },
            { q: "Khi làm việc ban đêm, xe nâng bắt buộc phải có thiết bị gì?", options: { A: "Còi hơi.", B: "Đèn chiếu sáng và đèn tín hiệu.", C: "Gương chiếu hậu lớn.", D: "Máy nghe nhạc." }, correct: "B", group: "An toàn" },
            { q: "Khói xả động cơ diesel có màu đen đặc là dấu hiệu gì?", options: { A: "Động cơ quá tốt.", B: "Thừa nhiên liệu hoặc lọc gió bị tắc.", C: "Thiếu dầu bôi trơn.", D: "Hết nước làm mát." }, correct: "B", group: "Bảo dưỡng" },
            { q: "Khoảng cách giữa hai càng nâng nên điều chỉnh như thế nào?", options: { A: "Càng rộng càng tốt.", B: "Càng hẹp càng tốt.", C: "Rộng tối đa và cân đối với tải trọng.", D: "Giữ nguyên một vị trí cố định." }, correct: "C", group: "Vận hành" },
            { q: "Khi lái xe nâng lên dốc có hàng, người lái phải đi như thế nào?", options: { A: "Đi tiến.", B: "Đi lùi.", C: "Đi chéo.", D: "Tắt máy đẩy lên." }, correct: "A", group: "Kỹ thuật lái" },
            { q: "Tải trọng tâm (Load Center) thường được tính từ đâu?", options: { A: "Từ đầu càng nâng.", B: "Từ mặt tựa lưng của càng nâng.", C: "Từ bánh trước.", D: "Từ mặt đất." }, correct: "B", group: "Thông số kỹ thuật" },
            { q: "Pallet hỏng có được sử dụng để nâng hàng không?", options: { A: "Được nếu hàng nhẹ.", B: "Được nếu dùng dây buộc lại.", C: "Tuyệt đối không được sử dụng.", D: "Được nếu chỉ nâng thấp." }, correct: "C", group: "An toàn" },
            { q: "Khi người đi bộ cắt ngang đường xe nâng đang chạy, ưu tiên thuộc về ai?", options: { A: "Xe nâng.", B: "Người đi bộ.", C: "Ai đi nhanh hơn thì đi trước.", D: "Do hai bên tự thỏa thuận." }, correct: "B", group: "An toàn" },
            { q: "Van an toàn trong hệ thống thủy lực có tác dụng gì?", options: { A: "Tăng tốc độ nâng.", B: "Tránh quá tải cho hệ thống.", C: "Giảm tiếng ồn.", D: "Tiết kiệm dầu." }, correct: "B", group: "Cấu tạo" },
            { q: "Nhiên liệu của xe nâng điện là gì?", options: { A: "Xăng.", B: "Dầu Diesel.", C: "Ắc quy (điện năng).", D: "Gas (LPG)." }, correct: "C", group: "Cấu tạo" },

            { q: "Khi nâng hàng, nếu hàng bị vướng vào giá kệ, bạn nên:", options: { A: "Cố gắng giật mạnh ra.", B: "Hạ hàng xuống, điều chỉnh lại vị trí rồi mới nâng tiếp.", C: "Tăng ga thật lớn.", D: "Nhờ người leo lên gỡ." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Bộ phận nào bảo vệ người lái khi có hàng rơi từ trên cao xuống?", options: { A: "Mái che an toàn (Overhead Guard).", B: "Cửa kính.", C: "Mũ bảo hiểm.", D: "Càng nâng." }, correct: "A", group: "Cấu tạo" },
            { q: "Việc chở thêm người trên xe nâng khi không có ghế ngồi cho họ là:", options: { A: "Được phép nếu đi chậm.", B: "Vi phạm quy tắc an toàn nghiêm trọng.", C: "Được nếu là sếp.", D: "Được nếu người đó đứng chắc trên đối trọng." }, correct: "B", group: "An toàn" },
            { q: "Khi đỗ xe trên dốc (trường hợp khẩn cấp), bạn phải làm gì ngoài phanh tay?", options: { A: "Tắt máy và bỏ đi.", B: "Chèn bánh xe bằng gỗ hoặc đá.", C: "Cứ để xe trôi tự do.", D: "Nhờ người giữ xe." }, correct: "B", group: "Vận hành" },
            { q: "Dầu phanh xe nâng cần được kiểm tra ở đâu?", options: { A: "Bình chứa dầu phanh thường nằm gần bàn đạp phanh hoặc trong khoang máy.", B: "Trong lốp xe.", C: "Trong ống xả.", D: "Trên nóc cabin." }, correct: "A", group: "Bảo dưỡng" },
            { q: "Tiếng còi 'bíp bíp' khi xe nâng lùi có mục đích gì?", options: { A: "Để người lái đỡ buồn ngủ.", B: "Cảnh báo cho người xung quanh biết xe đang lùi.", C: "Báo hiệu xe sắp hết xăng.", D: "Báo hiệu xe đã hỏng." }, correct: "B", group: "Tín hiệu" },
            { q: "Khi vận chuyển hàng lỏng trong thùng, cần lưu ý điều gì?", options: { A: "Đi thật nhanh.", B: "Tránh phanh gấp hoặc đổi hướng đột ngột vì sóng sánh làm lật xe.", C: "Mở nắp thùng ra cho thoáng.", D: "Không cần lưu ý gì." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Ánh sáng xanh (Blue Light) chiếu xuống đất phía sau xe nâng điện dùng để:", options: { A: "Làm đẹp cho xe.", B: "Cảnh báo sớm cho người đi bộ biết xe đang đi tới từ phía sau.", C: "Chiếu sáng đường đi.", D: "Báo hiệu xe đã đầy pin." }, correct: "B", group: "Tín hiệu" },
            { q: "Kỹ năng 'Sling' (sử dụng dây cẩu) kết hợp với xe nâng có được phép không?", options: { A: "Được nếu có phụ kiện chuyên dụng và được cấp phép.", B: "Tuyệt đối cấm dùng dây buộc vào càng nâng.", C: "Được nếu dùng dây thừng chắc.", D: "Chỉ được dùng dây thép." }, correct: "A", group: "Vận hành" },
            { q: "Khi làm việc dưới trời mưa, xe nâng dầu cần lưu ý gì?", options: { A: "Trơn trượt và tầm nhìn hạn chế.", B: "Xe sẽ sạch hơn.", C: "Xe sẽ mát hơn.", D: "Không nên làm việc dưới mưa." }, correct: "A", group: "An toàn" },
            { q: "Sau khi kết thúc ca làm việc, bạn nên làm gì với chìa khóa xe?", options: { A: "Cứ để trên xe.", B: "Rút chìa khóa và bàn giao hoặc để đúng nơi quy định.", C: "Cầm về nhà.", D: "Vứt đi." }, correct: "B", group: "Vận hành" },
            { q: "Lốp đặc (Solid Tire) thường được dùng trong môi trường nào?", options: { A: "Đường bùn lầy.", B: "Sàn kho bằng phẳng, nhiều vật sắc nhọn (đinh, mảnh gỗ).", C: "Trên bãi cát.", D: "Trong rừng." }, correct: "B", group: "Thông số kỹ thuật" },
            { q: "Khi thấy xe nâng khác đang tiến lại gần ở ngã tư kho, bạn nên:", options: { A: "Tăng tốc để vượt qua trước.", B: "Giảm tốc độ, bấm còi, và nhường đường nếu cần thiết.", C: "Cứ đi bình thường.", D: "Dừng lại và tắt máy." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Tại sao không được phép nâng hàng khi trụ nâng đang nghiêng về phía trước?", options: { A: "Làm hàng dễ bị trượt rơi và xe dễ lật về phía trước.", B: "Làm xe đi chậm.", C: "Làm hỏng xích nâng.", D: "Làm tốn dầu thủy lực." }, correct: "A", group: "An toàn" },
            { q: "Vệ sinh xe nâng nên thực hiện khi nào?", options: { A: "Khi xe quá bẩn.", B: "Định kỳ hàng tuần hoặc sau ca làm việc trong môi trường bụi bẩn.", C: "Khi xe hỏng.", D: "Không cần vệ sinh." }, correct: "B", group: "Bảo dưỡng" },
            { q: "Người lái xe nâng có được phép tự ý sửa chữa hệ thống điện không?", options: { A: "Được nếu biết sơ sơ.", B: "Không, phải do nhân viên kỹ thuật chuyên môn thực hiện.", C: "Được nếu có kìm và tuốc nơ vít.", D: "Được nếu xe đã hết bảo hành." }, correct: "B", group: "Bảo dưỡng" },
            { q: "Khi xuống dốc không tải (không có hàng), xe nâng đi như thế nào?", options: { A: "Đi tiến.", B: "Đi lùi.", C: "Đi chéo.", D: "Tắt máy thả trôi." }, correct: "A", group: "Kỹ thuật lái" },
            { q: "Tốc độ tối đa an toàn của xe nâng trong kho thường là:", options: { A: "5 - 10 km/h.", B: "30 km/h.", C: "50 km/h.", D: "Tùy ý người lái." }, correct: "A", group: "Vận hành" },
            { q: "Thái độ quan trọng nhất của người lái xe nâng là gì?", options: { A: "Luôn đặt an toàn lên hàng đầu.", B: "Làm việc thật nhanh để tăng sản lượng.", C: "Tiết kiệm nhiên liệu tối đa.", D: "Nghe lời sếp tuyệt đối dù mất an toàn." }, correct: "A", group: "An toàn" }
        ];

        let examQuestions = [];
        let userAnswers = new Array(30).fill(null);
        let currentIdx = 0;
        let timeLeft = 1200;
        let timerId;

        function startExamNow() {
            const name = document.getElementById('inputName').value.trim();
            const className = document.getElementById('inputClass').value.trim();

            if (!name || !className) {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return;
            }

            document.getElementById('studentName').innerText = name;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainHeader').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');

            initExamData();
        }

        function initExamData() {
            // Lấy ngẫu nhiên 30 câu (ở đây demo 10 câu lặp lại cho đủ 30)
            let pool = [...questionBank];
            while(pool.length < 30) pool = pool.concat(questionBank);
            examQuestions = pool.sort(() => 0.5 - Math.random()).slice(0, 30);

            renderGrids();
            showQuestion(0);
            startTimer();
        }

        function renderGrids() {
            const desktopGrid = document.getElementById('questionGrid');
            const mobileGrid = document.getElementById('mobileGrid');
            
            [desktopGrid, mobileGrid].forEach(grid => {
                grid.innerHTML = '';
                for(let i=0; i<30; i++) {
                    const btn = document.createElement('div');
                    btn.className = `q-grid-item h-10 flex items-center justify-center bg-white border border-gray-200 rounded-lg cursor-pointer font-bold text-xs shadow-sm`;
                    btn.id = `${grid.id}-item-${i}`;
                    btn.innerText = i + 1;
                    btn.onclick = () => showQuestion(i);
                    grid.appendChild(btn);
                }
            });
        }

        function showQuestion(idx) {
            currentIdx = idx;
            const q = examQuestions[idx];
            
            document.getElementById('currentQNum').innerText = idx + 1;
            document.getElementById('questionText').innerText = q.q;
            document.getElementById('questionTag').innerText = q.group;
            
            const imgWrap = document.getElementById('imageWrapper');
            imgWrap.classList.toggle('hidden', !q.image);
            if(q.image) document.getElementById('questionImage').src = q.image;

            const list = document.getElementById('optionsList');
            list.innerHTML = '';
            
            ['A', 'B', 'C', 'D'].forEach(label => {
                if(q.options[label]) {
                    const btn = document.createElement('div');
                    btn.className = `option-card p-4 border-2 border-gray-100 rounded-xl cursor-pointer transition-all flex items-center ${userAnswers[idx] === label ? 'selected' : ''}`;
                    btn.innerHTML = `
                        <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mr-4 font-black text-sm ${userAnswers[idx] === label ? 'bg-blue-600 border-blue-600 text-white' : 'border-gray-200 text-gray-400'}">
                            ${label}
                        </div>
                        <div class="text-gray-700 font-bold text-sm md:text-base">${q.options[label]}</div>
                    `;
                    btn.onclick = () => selectOption(idx, label);
                    list.appendChild(btn);
                }
            });

            // Update Grids
            document.querySelectorAll('.q-grid-item').forEach(el => el.classList.remove('active'));
            const dItem = document.getElementById(`questionGrid-item-${idx}`);
            const mItem = document.getElementById(`mobileGrid-item-${idx}`);
            if(dItem) dItem.classList.add('active');
            if(mItem) mItem.classList.add('active');

            // Scroll to top
            document.getElementById('mainScrollArea').scrollTop = 0;
        }

        function selectOption(qIdx, option) {
            userAnswers[qIdx] = option;
            const dItem = document.getElementById(`questionGrid-item-${qIdx}`);
            const mItem = document.getElementById(`mobileGrid-item-${qIdx}`);
            if(dItem) dItem.classList.add('answered');
            if(mItem) mItem.classList.add('answered');
            showQuestion(qIdx);
            
            // Auto next after 300ms for better flow
            setTimeout(() => { if(currentIdx < 29) showQuestion(currentIdx + 1); }, 300);
        }

        function nextQuestion() { if(currentIdx < 29) showQuestion(currentIdx + 1); }
        function prevQuestion() { if(currentIdx > 0) showQuestion(currentIdx - 1); }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if(timeLeft <= 0) submitExam();
            }, 1000);
        }

        function confirmSubmit() {
            if(confirm("Bạn có chắc chắn muốn nộp bài?")) submitExam();
        }

        function submitExam() {
            clearInterval(timerId);
            let score = userAnswers.reduce((acc, ans, i) => acc + (ans === examQuestions[i].correct ? 1 : 0), 0);
            const isPassed = score >= 27;
            
            document.getElementById('resultModal').classList.remove('hidden');
            document.getElementById('resultIcon').innerText = isPassed ? '🏆' : '⚠️';
            document.getElementById('resultTitle').innerText = isPassed ? "ĐẠT KẾT QUẢ" : "KHÔNG ĐẠT";
            document.getElementById('resultTitle').className = `text-2xl font-black mb-1 ${isPassed ? 'text-green-600' : 'text-red-600'}`;
            document.getElementById('resultScore').innerText = `${score}/30`;
            document.getElementById('resultDetails').innerHTML = `
                <p><b>Học viên:</b> ${document.getElementById('studentName').innerText}</p>
                <p><b>Kết quả:</b> ${isPassed ? 'Chúc mừng bạn đã vượt qua!' : 'Bạn cần cố gắng hơn lần sau.'}</p>
            `;
        }
    </script>
