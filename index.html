<section id="auth-view" class="bg-white rounded-3xl p-8 shadow-xl border border-gray-100 max-w-md mx-auto mt-10">
    <div class="text-center mb-8">
        <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
        </div>
        <h3 class="text-2xl font-extrabold text-slate-800 uppercase tracking-tight">Thông Tin Thí Sinh</h3>
        <p class="text-slate-500 text-sm mt-2">Khoa Máy thi công - Sát hạch xe nâng</p>
    </div>
    
    <div class="space-y-5">
        <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Họ và Tên Học Viên</label>
            <input type="text" id="student-name" placeholder="VÍ DỤ: PHẠM NGỌC HOÀN" 
                class="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none font-bold uppercase transition-all shadow-sm">
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Khóa / Lớp</label>
            <input type="text" id="student-class" placeholder="VÍ DỤ: K65-XN01" 
                class="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none font-bold uppercase transition-all shadow-sm">
        </div>

        <button onclick="startExam()" 
            class="w-full bg-blue-700 hover:bg-blue-800 text-white py-5 rounded-2xl font-black text-xl transition-all shadow-xl uppercase mt-4">
            Bắt Đầu Sát Hạch
        </button>
    </div>
</section>
