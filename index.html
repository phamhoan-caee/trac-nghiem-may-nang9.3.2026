<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÁT HẠCH VẬN HÀNH CẦU TRỤC - CAEE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <div id="start-screen">
        <div class="welcome-container">
            <div class="welcome-left">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0id2hpdGUiPjxwYXRoIGQ9Ik0yMCAydjhINXYySDR2LTJhMiAyIDAgMCAxIDItMmgxNHoiLz48cGF0aCBkPSJNMjIgNXYxNGEyIDIgMCAwIDEtMiAyaC0xNGEyIDIgMCAwIDEtMi0yVjVoMjB6TTUgN2gxNHYxMkg1Vjd6bTggNWg0djRIMTN2LTR6bS00IDBoNHYxSDl2LTF6bS0xIDNoNHYxSjh2LTF6Ii8+PC9zdmc+" alt="ID Icon">
                <h5>SÁT HẠCH VH CẦU TRỤC</h5>
            </div>
            
            <div class="welcome-right">
                <div class="school-name">TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP</div>
                <div class="school-name">VÀ MÔI TRƯỜNG</div>
                <div class="faculty-name">KHOA MÁY THI CÔNG</div>

                <div class="form-group">
                    <label>Họ và Tên:</label>
                    <input type="text" id="studentName" class="form-control" placeholder="Ví dụ: Nguyễn Văn A">
                </div>

                <div class="form-group">
                    <label>Khóa:</label>
                    <input type="text" id="studentID" class="form-control" placeholder="Ví dụ: 4.2026">
                </div>

                <button class="btn-start" onclick="startQuiz()">
                    BẮT ĐẦU THI ➔
                </button>

                <div class="footer-welcome">© 2026 Trung tâm Đào tạo Kỹ thuật - CAEE</div>
            </div>
        </div>
    </div>

    <div class="caee-header" id="caee-header" style="display:none;">
        <div class="header-title">
            SÁT HẠCH CẦU TRỤC - TRƯỜNG CAO ĐẲNG CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG
        </div>
        <div class="header-info">
            <div class="student-id-display" id="header-student-info">Học viên: ...</div>
            <div class="timer-box" id="timer">20:00</div>
        </div>
    </div>

    <div id="quiz-screen" style="display:none;">
        
        <div id="quiz-content">
            </div>

        <div class="sidebar-right">
            <div class="question-grid-card">
                <div class="sidebar-title">SƠ ĐỒ CÂU HỎI</div>
                <div class="q-grid" id="nav-grid">
                    </div>
            </div>

            <div class="status-legend-card">
                <div class="sidebar-title">TRẠNG THÁI</div>
                <div class="legend-item">
                    <span class="dot dot-green"></span>
                    <span>Đã trả lời</span>
                </div>
                <div class="legend-item">
                    <span class="dot dot-orange"></span>
                    <span>Đang chọn</span>
                </div>
            </div>

            <button class="btn-submit" onclick="submitQuiz()">NỘP BÀI</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>

</body>
</html>
