<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SÁT HẠCH LÝ THUYẾT MÁY NÂNG HÀNG - CAEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: #f0f2f5; 
            -webkit-tap-highlight-color: transparent;
        }
        .q-grid-item { transition: all 0.2s; }
        .q-grid-item.active { border: 3px solid #f59e0b; background-color: #fef3c7; color: #b45309; }
        .q-grid-item.answered { background-color: #10b981; color: white; border-color: #059669; }
        
        .option-card { touch-action: manipulation; }
        .option-card:active { transform: scale(0.98); }
        .option-card.selected { border-color: #2563eb; background-color: #dbeafe; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
        
        #mainScrollArea::-webkit-scrollbar { width: 4px; }
        #mainScrollArea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }

        @media (max-width: 768px) {
            #mainContent { flex-direction: column; overflow-y: auto; }
            aside { width: 100% !important; border-left: none; border-top: 1px solid #e2e8f0; }
            #timerDisplay { font-size: 1.25rem; padding: 0.25rem 0.75rem; }
            header h1 { font-size: 0.9rem; }
            .option-card { padding: 1rem !important; }
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-blue-900 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col md:flex-row">
            <div class="md:w-1/3 bg-blue-700 p-6 text-white flex flex-col justify-center items-center text-center">
                <i class="fas fa-id-card text-5xl mb-4"></i>
                <h2 class="text-xl font-bold uppercase tracking-tighter">Thông tin Học viên</h2>
            </div>
            <div class="md:w-2/3 p-6">
                <div class="mb-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-1">TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</h3>
                    <p class="text-blue-600 font-bold text-xs uppercase">KHOA MÁY THI CÔNG</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Họ và Tên:</label>
                        <input type="text" id="inputName" placeholder="Nguyễn Văn A" 
                               class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:outline-none transition text-lg">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Khóa:</label>
                        <input type="text" id="inputClass" placeholder="Ví dụ: 4.2026" 
                               class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:outline-none transition text-lg">
                    </div>
                    <button onclick="startExamNow()" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-black rounded-xl shadow-lg transition active:scale-95 mt-4 uppercase tracking-widest">
                        BẮT ĐẦU THI <i class="fas fa-play ml-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header id="mainHeader" class="hidden bg-blue-800 text-white p-3 md:p-4 shadow-md flex justify-between items-center z-50">
        <div class="flex items-center space-x-2">
            <i class="fas fa-truck-moving text-xl md:text-2xl text-orange-400"></i>
            <h1 class="text-sm md:text-xl font-bold uppercase truncate max-w-[150px] md:max-w-none">SÁT HẠCH LÝ THUYẾT</h1>
        </div>
        <div id="timerDisplay" class="bg-red-600 px-3 py-1 md:px-4 md:py-2 rounded-lg text-xl md:text-2xl font-mono font-bold shadow-inner border border-red-400">
            20:00
        </div>
    </header>

    <!-- Main Content -->
    <main id="mainContent" class="hidden flex-1 flex overflow-hidden">
        
        <section id="mainScrollArea" class="flex-1 p-3 md:p-6 overflow-y-auto bg-gray-100 scroll-smooth">
            <div id="questionContainer" class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm p-5 md:p-8 fade-in relative">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <span id="questionTag" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider">Lý thuyết</span>
                        <p class="text-gray-400 font-bold text-xs mt-2 uppercase">Câu <span id="currentQNum" class="text-blue-600 text-lg">1</span>/30</p>
                    </div>
                    <!-- AI Feature: Explain Question -->
                    <button onclick="explainQuestionWithAI()" class="flex items-center space-x-2 bg-purple-50 hover:bg-purple-100 text-purple-700 px-3 py-2 rounded-lg border border-purple-200 transition text-xs font-bold">
                        <span id="aiExplainBtnText">✨ Giải thích bằng AI</span>
                    </button>
                </div>

                <h2 id="questionText" class="text-lg md:text-2xl font-bold text-gray-800 mb-6 leading-tight">Đang tải câu hỏi...</h2>

                <div id="aiExplanation" class="hidden mb-6 p-4 bg-purple-50 border-l-4 border-purple-500 rounded-r-xl text-sm text-purple-900 animate-pulse">
                    <!-- AI Text Content -->
                </div>

                <div id="optionsList" class="grid grid-cols-1 gap-3 md:gap-4"></div>

                <div class="mt-8 md:mt-12 pt-6 border-t flex justify-between items-center">
                    <button onclick="prevQuestion()" class="px-6 py-3 bg-white border-2 border-gray-100 text-gray-500 rounded-xl font-bold transition text-xs uppercase">
                        <i class="fas fa-chevron-left mr-1"></i> Trước
                    </button>
                    <button onclick="nextQuestion()" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold transition shadow-md text-xs uppercase">
                        Tiếp <i class="fas fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>
            
            <div class="md:hidden mt-6 p-2">
                <div id="mobileGrid" class="grid grid-cols-6 gap-2"></div>
            </div>
        </section>

        <!-- Sidebar -->
        <aside class="hidden md:flex w-80 bg-white border-l shadow-xl p-6 flex-col">
            <h3 class="font-black text-gray-400 uppercase tracking-widest text-[10px] mb-4 text-center">Sơ đồ câu hỏi</h3>
            <div id="questionGrid" class="grid grid-cols-5 gap-2 mb-6"></div>
            
            <div class="mt-auto space-y-4">
                <button onclick="confirmSubmit()" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-black rounded-xl shadow-lg transition text-lg uppercase">
                    Nộp bài
                </button>
            </div>
        </aside>
    </main>

    <!-- Modal Kết quả -->
    <div id="resultModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[200] p-4 backdrop-blur-sm overflow-y-auto">
        <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-6 md:p-8 text-center my-auto">
            <div id="resultIcon" class="text-6xl mb-4"></div>
            <h2 id="resultTitle" class="text-2xl font-black mb-1 uppercase"></h2>
            <p id="resultScore" class="text-5xl font-mono font-black text-blue-600 mb-4"></p>
            
            <!-- AI Feature: Result Feedback -->
            <div id="aiFeedbackArea" class="hidden mb-6 text-left">
                <div class="flex items-center space-x-2 text-purple-700 mb-2">
                    <i class="fas fa-magic"></i>
                    <span class="font-black text-xs uppercase tracking-widest">✨ Phân tích lỗi sai từ AI</span>
                </div>
                <div id="aiFeedbackText" class="bg-purple-50 p-4 rounded-2xl text-sm text-purple-900 border border-purple-100 italic leading-relaxed">
                    Đang phân tích bài làm của bạn...
                </div>
            </div>

            <div id="resultDetails" class="bg-gray-50 rounded-2xl p-4 mb-6 text-left space-y-2 text-xs"></div>
            
            <button onclick="window.location.reload()" class="w-full py-4 bg-gray-800 text-white rounded-xl font-black shadow-lg uppercase">Thoát</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // API Key provided by environment

        const questionBank = [
            { q: "Khi lên hoặc xuống cabin xe nâng, người lái xe cần thực hiện như thế nào cho đúng?", options: { A: "Nhảy nhanh lên cabin để tiết kiệm thời gian.", B: "Bám vô lăng để leo lên.", C: "Tay trái nắm tay vịn, tay phải bám vào tựa lưng ghế, bước từng bậc lên xuống.", D: "Đặt chân lên càng nâng để leo lên." }, correct: "C", group: "Kỹ thuật lái" },
            { q: "Mục đích chính của việc kiểm tra xe nâng trước mỗi ca làm việc là gì?", options: { A: "Để đảm bảo xe luôn sạch sẽ.", B: "Để phát hiện sớm các hư hỏng tiềm ẩn và đảm bảo an toàn.", C: "Để tính toán lượng nhiên liệu.", D: "Để báo cáo cho cấp trên." }, correct: "B", group: "An toàn" },
            { q: "Khoảng cách an toàn tối thiểu giữa xe nâng và người đi bộ trong kho là bao nhiêu?", options: { A: "0.5 mét", B: "1 mét", C: "Ít nhất 2 mét", D: "5 mét" }, correct: "C", group: "An toàn" },
            { q: "Khi di chuyển trên mặt bằng phẳng không có hàng, chiều cao càng nâng nên là:", options: { A: "Sát mặt đất", B: "15 - 20 cm", C: "50 cm", D: "Nâng cao hết mức" }, correct: "B", group: "Vận hành" },
            { q: "Nếu tải trọng hàng che khuất tầm nhìn phía trước, người lái phải làm gì?", options: { A: "Rướn người ra ngoài", B: "Lùi xe khi di chuyển", C: "Nhờ người ngồi lên hàng chỉ đường", D: "Bấm còi liên tục và đi thẳng" }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Đèn cảnh báo nào sẽ sáng nếu hệ thống sạc của xe (máy phát) gặp sự cố?", options: { A: "Đèn báo dầu", B: "Đèn báo nhiệt độ", C: "Đèn báo ắc quy/sạc", D: "Đèn báo phanh" }, correct: "C", group: "Tín hiệu" },
            { q: "Khi thấy hàng bị nghiêng trên pallet, người lái cần làm gì?", options: { A: "Dừng xe và chỉnh lại hàng.", B: "Vẫn di chuyển bình thường.", C: "Tăng tốc để hàng không rơi.", D: "Phanh gấp để hàng cân bằng lại." }, correct: "A", group: "Kỹ thuật lái" },
            { q: "Trọng tâm của xe nâng thay đổi như thế nào khi nâng hàng lên cao?", options: { A: "Dịch chuyển ra phía trước và lên cao.", B: "Dịch chuyển ra phía sau.", C: "Không thay đổi.", D: "Hạ thấp xuống đất." }, correct: "A", group: "Lý thuyết cơ bản" },
            { q: "Khi xe nâng đang xuống dốc có tải, người lái nên di chuyển như thế nào?", options: { A: "Đi tiến.", B: "Đi lùi.", C: "Tắt máy thả trôi.", D: "Đi chéo dốc." }, correct: "B", group: "Kỹ thuật lái" },
            { q: "Sức nâng ghi trên biểu đồ tải trọng (Load Chart) là sức nâng tương ứng với:", options: { A: "Trọng tâm tải ở bất kỳ vị trí nào.", B: "Trọng tâm tải ở vị trí tiêu chuẩn.", C: "Chiều cao nâng tối đa.", D: "Chiều dài càng nâng." }, correct: "B", group: "Thông số kỹ thuật" }
        ];

        let examQuestions = [];
        let userAnswers = new Array(30).fill(null);
        let currentIdx = 0;
        let timeLeft = 1200;
        let timerId;

        // Gemini Integration Functions
        async function callGemini(prompt, systemPrompt = "Bạn là chuyên gia an toàn vận hành xe nâng hàng.") {
            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Không thể nhận phản hồi từ AI.";
                } catch (e) {
                    if (i === 4) throw e;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        async function explainQuestionWithAI() {
            const btn = document.getElementById('aiExplainBtnText');
            const box = document.getElementById('aiExplanation');
            const q = examQuestions[currentIdx];
            
            btn.innerHTML = `<span class="loader"></span> Đang giải thích...`;
            box.classList.remove('hidden');
            box.innerHTML = "✨ Gemini đang phân tích câu hỏi...";

            const prompt = `Giải thích ngắn gọn tại sao đáp án "${q.correct}" là đúng cho câu hỏi sau: "${q.q}". Các lựa chọn là: ${JSON.stringify(q.options)}. Trả lời bằng tiếng Việt, súc tích, tập trung vào an toàn.`;
            
            try {
                const explanation = await callGemini(prompt);
                box.classList.remove('animate-pulse');
                box.innerHTML = `<strong>Giải thích từ AI:</strong><br>${explanation}`;
            } catch (err) {
                box.innerHTML = "⚠️ Lỗi kết nối AI. Vui lòng thử lại.";
            } finally {
                btn.innerText = "✨ Giải thích bằng AI";
            }
        }

        async function getAIFeedback(wrongQuestions) {
            if (wrongQuestions.length === 0) {
                document.getElementById('aiFeedbackText').innerText = "Chúc mừng! Bạn làm đúng tuyệt đối. Hãy giữ vững phong độ này trong kỳ thi thật nhé!";
                return;
            }

            const prompt = `Học viên vừa làm sai các câu hỏi về: ${wrongQuestions.map(q => q.group).join(', ')}. Dựa trên các chủ đề này, hãy đưa ra 3 lời khuyên ngắn gọn để học viên cải thiện kiến thức vận hành xe nâng an toàn.`;
            
            try {
                const feedback = await callGemini(prompt, "Bạn là giảng viên đào tạo lái xe nâng chuyên nghiệp.");
                document.getElementById('aiFeedbackText').innerText = feedback;
            } catch (err) {
                document.getElementById('aiFeedbackText').innerText = "Không thể tải phân tích lúc này.";
            }
        }

        // Exam Engine
        function startExamNow() {
            const name = document.getElementById('inputName').value.trim();
            if (!name) return alert("Vui lòng nhập tên!");
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainHeader').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            initExamData();
        }

        function initExamData() {
            let pool = [...questionBank];
            while(pool.length < 30) pool = pool.concat(questionBank);
            examQuestions = pool.sort(() => 0.5 - Math.random()).slice(0, 30);
            renderGrids();
            showQuestion(0);
            startTimer();
        }

        function renderGrids() {
            ['questionGrid', 'mobileGrid'].forEach(id => {
                const grid = document.getElementById(id);
                grid.innerHTML = '';
                for(let i=0; i<30; i++) {
                    const btn = document.createElement('div');
                    btn.className = `q-grid-item h-10 flex items-center justify-center bg-white border border-gray-200 rounded-lg cursor-pointer font-bold text-xs shadow-sm`;
                    btn.id = `${id}-item-${i}`;
                    btn.innerText = i + 1;
                    btn.onclick = () => showQuestion(i);
                    grid.appendChild(btn);
                }
            });
        }

        function showQuestion(idx) {
            currentIdx = idx;
            const q = examQuestions[idx];
            document.getElementById('currentQNum').innerText = idx + 1;
            document.getElementById('questionText').innerText = q.q;
            document.getElementById('questionTag').innerText = q.group;
            document.getElementById('aiExplanation').classList.add('hidden'); // Reset AI explain box

            const list = document.getElementById('optionsList');
            list.innerHTML = '';
            ['A', 'B', 'C', 'D'].forEach(label => {
                if(q.options[label]) {
                    const btn = document.createElement('div');
                    btn.className = `option-card p-4 border-2 border-gray-100 rounded-xl cursor-pointer transition-all flex items-center ${userAnswers[idx] === label ? 'selected' : ''}`;
                    btn.innerHTML = `
                        <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mr-4 font-black text-sm ${userAnswers[idx] === label ? 'bg-blue-600 border-blue-600 text-white' : 'border-gray-200 text-gray-400'}">${label}</div>
                        <div class="text-gray-700 font-bold text-sm md:text-base">${q.options[label]}</div>
                    `;
                    btn.onclick = () => selectOption(idx, label);
                    list.appendChild(btn);
                }
            });

            document.querySelectorAll('.q-grid-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`questionGrid-item-${idx}`)?.classList.add('active');
            document.getElementById(`mobileGrid-item-${idx}`)?.classList.add('active');
            document.getElementById('mainScrollArea').scrollTop = 0;
        }

        function selectOption(qIdx, option) {
            userAnswers[qIdx] = option;
            document.getElementById(`questionGrid-item-${qIdx}`)?.classList.add('answered');
            document.getElementById(`mobileGrid-item-${qIdx}`)?.classList.add('answered');
            showQuestion(qIdx);
            setTimeout(() => { if(currentIdx < 29) showQuestion(currentIdx + 1); }, 400);
        }

        function nextQuestion() { if(currentIdx < 29) showQuestion(currentIdx + 1); }
        function prevQuestion() { if(currentIdx > 0) showQuestion(currentIdx - 1); }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if(timeLeft <= 0) submitExam();
            }, 1000);
        }

        function confirmSubmit() { if(confirm("Nộp bài thi?")) submitExam(); }

        function submitExam() {
            clearInterval(timerId);
            let score = userAnswers.reduce((acc, ans, i) => acc + (ans === examQuestions[i].correct ? 1 : 0), 0);
            const isPassed = score >= 27;
            
            document.getElementById('resultModal').classList.remove('hidden');
            document.getElementById('resultIcon').innerText = isPassed ? '🏆' : '⚠️';
            document.getElementById('resultTitle').innerText = isPassed ? "ĐẠT KẾT QUẢ" : "KHÔNG ĐẠT";
            document.getElementById('resultTitle').className = `text-2xl font-black mb-1 ${isPassed ? 'text-green-600' : 'text-red-600'}`;
            document.getElementById('resultScore').innerText = `${score}/30`;
            
            // Trigger AI Feedback
            document.getElementById('aiFeedbackArea').classList.remove('hidden');
            const wrongQs = examQuestions.filter((q, i) => userAnswers[i] !== q.correct);
            getAIFeedback(wrongQs);
        }
    </script>
</body>
</html>
