<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SÁT HẠCH LÝ THUYẾT MÁY NÂNG HÀNG - CAEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; -webkit-tap-highlight-color: transparent; }
        .q-grid-item { transition: all 0.2s; cursor: pointer; }
        .q-grid-item.active { border: 3px solid #f59e0b; background-color: #fef3c7; color: #b45309; }
        .q-grid-item.answered { background-color: #10b981; color: white; border-color: #059669; }
        .option-card { touch-action: manipulation; }
        .option-card:active { transform: scale(0.98); }
        .option-card.selected { border-color: #2563eb; background-color: #dbeafe; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1); }
        #mainScrollArea::-webkit-scrollbar { width: 4px; }
        #mainScrollArea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media (max-width: 768px) {
            #mainContent { flex-direction: column; overflow-y: auto; }
            aside { width: 100% !important; border-left: none; border-top: 1px solid #e2e8f0; }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-blue-900 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden flex flex-col md:flex-row">
            <div class="md:w-1/3 bg-blue-700 p-6 text-white flex flex-col justify-center items-center text-center">
                <i class="fas fa-id-card text-5xl mb-4"></i>
                <h2 class="text-xl font-bold uppercase">Học viên</h2>
            </div>
            <div class="md:w-2/3 p-6">
                <div class="mb-6">
                    <h3 class="text-xl font-bold text-gray-800 mb-1">TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</h3>
                    <p class="text-blue-600 font-bold text-xs uppercase">KHOA MÁY THI CÔNG</p>
                </div>
                <div class="space-y-4">
                    <input type="text" id="inputName" placeholder="Họ và Tên" class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition text-lg">
                    <input type="text" id="inputClass" placeholder="Khóa: 4.2026" class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-blue-500 outline-none transition text-lg">
                    <button onclick="startExamNow()" class="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-black rounded-xl shadow-lg transition active:scale-95 uppercase tracking-widest">BẮT ĐẦU THI</button>
                </div>
            </div>
        </div>
    </div>

    <header id="mainHeader" class="hidden bg-blue-800 text-white p-3 md:p-4 shadow-md flex justify-between items-center z-50">
        <div class="flex items-center space-x-2">
            <i class="fas fa-truck-moving text-xl text-orange-400"></i>
            <h1 class="text-sm md:text-xl font-bold uppercase truncate">SÁT HẠCH LÝ THUYẾT MÁY NÂNG HÀNG</h1>
        </div>
        <div id="timerDisplay" class="bg-red-600 px-3 py-1 md:px-4 md:py-2 rounded-lg text-xl md:text-2xl font-mono font-bold shadow-inner">20:00</div>
    </header>

    <main id="mainContent" class="hidden flex-1 flex overflow-hidden">
        <section id="mainScrollArea" class="flex-1 p-3 md:p-6 overflow-y-auto bg-gray-100">
            <div id="questionContainer" class="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm p-5 md:p-8">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-400 font-bold text-xs uppercase tracking-widest">Đề thi chính thức</span>
                    <span class="text-gray-400 font-bold text-sm">Câu <span id="currentQNum" class="text-blue-600 text-lg">1</span>/30</span>
                </div>
                <h2 id="questionText" class="text-lg md:text-2xl font-bold text-gray-800 mb-6">Đang tải...</h2>
                <div id="imageWrapper" class="hidden mb-6 flex justify-center bg-gray-50 rounded-xl p-4 border"><img id="questionImage" src="" class="max-h-60 rounded shadow-sm"></div>
                <div id="optionsList" class="grid grid-cols-1 gap-4"></div>
                <div class="mt-8 pt-6 border-t flex justify-between gap-4">
                    <button onclick="prevQuestion()" class="flex-1 py-3 bg-white border-2 rounded-xl font-bold text-gray-500 uppercase text-sm">Trước</button>
                    <button onclick="nextQuestion()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md uppercase text-sm">Tiếp</button>
                </div>
            </div>
            <div id="mobileGrid" class="md:hidden grid grid-cols-6 gap-2 mt-6 p-2"></div>
        </section>

        <aside class="hidden md:flex w-80 bg-white border-l shadow-xl p-6 flex-col">
            <h3 class="font-black text-gray-400 uppercase text-[10px] mb-4 text-center">Sơ đồ câu hỏi</h3>
            <div id="questionGrid" class="grid grid-cols-5 gap-2 mb-6"></div>
            <button onclick="confirmSubmit()" class="mt-auto w-full py-4 bg-red-600 text-white font-black rounded-xl shadow-lg uppercase">Nộp bài</button>
        </aside>
    </main>

    <div id="resultModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[200] p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full p-8 text-center">
            <div id="resultIcon" class="text-6xl mb-4">🏆</div>
            <h2 id="resultTitle" class="text-2xl font-black mb-1">KẾT QUẢ</h2>
            <p id="resultScore" class="text-4xl font-black text-blue-600 mb-6">0/30</p>
            <div id="resultDetails" class="bg-gray-50 rounded-xl p-5 mb-6 text-left text-sm"></div>
            <button onclick="window.location.reload()" class="w-full py-4 bg-gray-800 text-white rounded-xl font-black uppercase">Thoát</button>
        </div>
    </div>

    <script>
        // Dữ liệu câu hỏi (Đã xóa thuộc tính group)
        const questionBank = [
            { q: "Trọng tâm của khối hàng nằm càng xa mặt tựa càng nâng thì:", options: { A: "Sức nâng của xe càng giảm.", B: "Sức nâng của xe càng tăng.", C: "Sức nâng không thay đổi.", D: "Xe đi nhanh hơn." }, correct: "A" },
            { q: "Khi lên hoặc xuống cabin xe nâng, người lái xe cần thực hiện như thế nào cho đúng?", options: { A: "Nhảy nhanh lên cabin để tiết kiệm thời gian.", B: "Bám vô lăng để leo lên.", C: "Tay trái nắm tay vịn, tay phải bám vào tựa lưng ghế, bước từng bậc lên xuống.", D: "Đặt chân lên càng nâng để leo lên." }, correct: "C", image: "https://drive.google.com/uc?export=download&id=1eRUzZsJtgEcj0vohejao3ga3iWJRr_UP" },
            { q: "Mục đích chính của việc kiểm tra xe nâng trước mỗi ca làm việc là gì?", options: { A: "Để đảm bảo xe luôn sạch sẽ.", B: "Để phát hiện sớm các hư hỏng tiềm ẩn và đảm bảo an toàn.", C: "Để tính toán lượng nhiên liệu.", D: "Để báo cáo cho cấp trên." }, correct: "B" },
            // ... THẦY DÁN TIẾP CÁC CÂU CÒN LẠI VÀO ĐÂY ...
        ];

        let examQuestions = [];
        let userAnswers = new Array(30).fill(null);
        let currentIdx = 0;
        let timeLeft = 1200;
        let timerId;

        function startExamNow() {
            const name = document.getElementById('inputName').value.trim();
            const className = document.getElementById('inputClass').value.trim();
            if (!name || !className) { alert("Vui lòng nhập đủ thông tin!"); return; }
            document.getElementById('studentName').innerText = name;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainHeader').classList.remove('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            initExamData();
        }

        function initExamData() {
            let pool = [...questionBank];
            while(pool.length < 30) pool = pool.concat(questionBank);
            examQuestions = pool.sort(() => 0.5 - Math.random()).slice(0, 30);
            renderGrids();
            showQuestion(0);
            startTimer();
        }

        function renderGrids() {
            const grids = [document.getElementById('questionGrid'), document.getElementById('mobileGrid')];
            grids.forEach(grid => {
                if(!grid) return;
                grid.innerHTML = '';
                for(let i=0; i<30; i++) {
                    const btn = document.createElement('div');
                    btn.className = `q-grid-item h-10 flex items-center justify-center bg-white border rounded-lg font-bold text-xs shadow-sm`;
                    btn.id = `${grid.id}-item-${i}`;
                    btn.innerText = i + 1;
                    btn.onclick = () => showQuestion(i);
                    grid.appendChild(btn);
                }
            });
        }

        function showQuestion(idx) {
            currentIdx = idx;
            const q = examQuestions[idx];
            document.getElementById('currentQNum').innerText = idx + 1;
            document.getElementById('questionText').innerText = q.q;
            
            const imgWrap = document.getElementById('imageWrapper');
            imgWrap.classList.toggle('hidden', !q.image);
            if(q.image) document.getElementById('questionImage').src = q.image;

            const list = document.getElementById('optionsList');
            list.innerHTML = '';
            ['A', 'B', 'C', 'D'].forEach(label => {
                if(q.options[label]) {
                    const btn = document.createElement('div');
                    btn.className = `option-card p-4 border-2 border-gray-100 rounded-xl cursor-pointer transition-all flex items-center ${userAnswers[idx] === label ? 'selected' : ''}`;
                    btn.innerHTML = `
                        <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mr-4 font-black text-sm ${userAnswers[idx] === label ? 'bg-blue-600 border-blue-600 text-white' : 'text-gray-400'}">
                            ${label}
                        </div>
                        <div class="text-gray-700 font-bold">${q.options[label]}</div>
                    `;
                    btn.onclick = () => selectOption(idx, label);
                    list.appendChild(btn);
                }
            });

            document.querySelectorAll('.q-grid-item').forEach(el => el.classList.remove('active'));
            const activeItems = [document.getElementById(`questionGrid-item-${idx}`), document.getElementById(`mobileGrid-item-${idx}`)];
            activeItems.forEach(it => it && it.classList.add('active'));
            document.getElementById('mainScrollArea').scrollTop = 0;
        }

        function selectOption(qIdx, option) {
            userAnswers[qIdx] = option;
            const items = [document.getElementById(`questionGrid-item-${qIdx}`), document.getElementById(`mobileGrid-item-${qIdx}`)];
            items.forEach(it => it && it.classList.add('answered'));
            
            // QUAN TRỌNG: Chỉ cập nhật giao diện, không nhảy câu
            showQuestion(qIdx); 
        }

        function nextQuestion() { if(currentIdx < 29) showQuestion(currentIdx + 1); }
        function prevQuestion() { if(currentIdx > 0) showQuestion(currentIdx - 1); }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                const min = Math.floor(timeLeft / 60);
                const sec = timeLeft % 60;
                document.getElementById('timerDisplay').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if(timeLeft <= 0) submitExam();
            }, 1000);
        }

        function confirmSubmit() { if(confirm("Bạn có chắc chắn muốn nộp bài?")) submitExam(); }

        function submitExam() {
            clearInterval(timerId);
            let score = userAnswers.reduce((acc, ans, i) => acc + (ans === examQuestions[i].correct ? 1 : 0), 0);
            document.getElementById('resultModal').classList.remove('hidden');
            document.getElementById('resultScore').innerText = `${score}/30`;
            document.getElementById('resultDetails').innerHTML = `Học viên: ${document.getElementById('studentName').innerText}<br>Kết quả: ${score >= 24 ? 'ĐẠT' : 'KHÔNG ĐẠT'}`;
        }
    </script>
</body>
</html>
